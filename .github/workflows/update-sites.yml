name: Sync Academic Submodule

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest academic SHA
        id: sha
        run: |
          git fetch --depth 1 origin main
          echo "sha=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT

      - name: Update submodule in this repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          # Check if submodule needs update
          SUBMODULE_PATH=$(git submodule status --cached | awk '{print $2}')
          CURRENT_SHA=$(git ls-tree HEAD vendor/academic 2>/dev/null | awk '{print $3}')
          NEW_SHA="${{ steps.sha.outputs.sha }}"

          if [ "$CURRENT_SHA" = "$NEW_SHA" ]; then
            echo "Already up to date"
          else
            git submodule update --init vendor/academic
            cd vendor/academic
            git fetch origin main
            git checkout $NEW_SHA
            cd ..
            git add vendor/academic
            git config --local user.name "academic-sync"
            git config --local user.email "bot@wangrui2025.github.io"
            git commit -m "chore: sync academic submodule to $(echo $NEW_SHA | cut -c1-8)"
            git push https://x-access-token:$GH_PAT@github.com/$REPO.git main
          fi
